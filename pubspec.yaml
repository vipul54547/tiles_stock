name: tiles_stock

description: Tiles Stock Finder App

publish_to: 'none'

version: 1.0.0+1



environment:

  sdk: '>=3.0.0 <4.0.0'



dependencies:

  flutter:

    sdk: flutter

  go_router: ^13.0.0

  provider: ^6.1.2

  cached_network_image: ^3.3.1

  google_fonts: ^6.2.1

  intl: ^0.19.0

  uuid: ^4.3.3

  flutter_staggered_grid_view: ^0.7.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1
  supabase_flutter: ^2.5.0
  file_picker: ^8.0.0
  http: ^1.2.0
  excel: ^4.0.6
  syncfusion_flutter_pdf: ^28.1.33
  syncfusion_flutter_xlsio: ^28.1.33   # generates the downloadable stock template (real dropdowns)
  image: ^4.3.0
  image_picker: ^1.1.2
  pdfx: ^2.6.0   # on-device PDF page rasteriser (pdfium) for the crop fallback
  font_awesome_flutter: ^11.0.0



dev_dependencies:

  flutter_test:

    sdk: flutter

  flutter_lints: ^3.0.0



flutter:

  uses-material-design: true

  assets:
    - assets/brand/
    - assets/images/600x600/Matt/
    - assets/images/600x600/Glossy/
    - assets/images/600x600/Satin/
    - assets/images/600x600/Carving/
    - assets/images/400x400/Matt/
    - assets/images/400x400/Glossy/
    - assets/images/400x400/Satin/
    - assets/images/400x400/Carving/
    - assets/images/300x600/Matt/
    - assets/images/300x600/Glossy/
    - assets/images/300x600/Satin/
    - assets/images/300x600/Carving/
    - assets/images/600x1200/Matt/
    - assets/images/600x1200/Glossy/
    - assets/images/600x1200/Satin/
    - assets/images/600x1200/Carving/
    - assets/geo/
